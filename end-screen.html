<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>라이브 종료</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-jp.min.css">
<style>
:root{
  --primary-normal:#13bb8f;
  --label-normal:rgba(226,232,240,0.99);
  --label-strong:#fff;
  --label-neutral:rgba(186,196,210,0.88);
  --label-alternative:rgba(148,163,184,0.61);
  --fill-normal:rgba(148,163,184,0.22);
  --fill-alternative:rgba(148,163,184,0.12);
  --accent-gold:#e8c87a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable JP',sans-serif;
  background:#0a0a0e;
  color:var(--label-normal);
  min-height:100vh;
  display:flex;justify-content:center;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:url('./images/bg-restaurant.png');
  background-size:cover;background-position:center;
  filter:blur(20px) brightness(0.4);
  transform:scale(1.15);
}
.container{
  max-width:430px;width:100%;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:60px 20px 40px;
  background:rgba(0,0,0,0.5);
  position:relative;z-index:1;
}
.profile{
  width:80px;height:80px;border-radius:50%;overflow:hidden;
  border:3px solid var(--primary-normal);
  margin-bottom:16px;
}
.profile img{width:100%;height:100%;object-fit:cover}
.title{font-size:20px;font-weight:700;color:var(--label-strong);margin-bottom:6px}
.subtitle{font-size:14px;color:var(--label-alternative);margin-bottom:32px}
.section-title{font-size:16px;font-weight:700;color:var(--label-strong);margin-bottom:16px}
.stats{
  display:flex;gap:24px;margin-bottom:32px;
}
.stat-item{text-align:center}
.stat-val{font-size:24px;font-weight:800;color:var(--label-strong)}
.stat-label{font-size:11px;color:var(--label-alternative);margin-top:2px}
/* 포디움 */
.podium{display:flex;gap:12px;justify-content:center;align-items:flex-end;margin-bottom:24px;width:100%}
.podium-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.podium-item.first{order:2}
.podium-item.second{order:1}
.podium-item.third{order:3}
.podium-avatar{display:none}
.podium-medal{width:20px;height:20px;margin-top:-4px}
.podium-name{font-size:12px;font-weight:600;color:var(--label-strong);max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-amount{font-size:11px;color:var(--accent-gold);font-weight:600}
.podium-bar{
  width:48px;border-radius:8px 8px 0 0;
  background:linear-gradient(180deg,rgba(232,200,122,0.2),rgba(232,200,122,0.05));
}
.podium-item.first .podium-bar{height:80px;background:linear-gradient(180deg,rgba(232,200,122,0.3),rgba(232,200,122,0.08))}
.podium-item.second .podium-bar{height:56px}
.podium-item.third .podium-bar{height:40px}
/* 리스트 */
.rank-list{width:100%;display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.rank-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:12px;
  background:var(--fill-alternative);
}
.rank-num{width:20px;font-size:13px;font-weight:700;color:var(--label-alternative);text-align:center;display:flex;align-items:center;justify-content:center}
.rank-medal{width:20px;height:20px;object-fit:contain}
.rank-item.rank-1st{background:rgba(147,51,234,0.12);border:1px solid rgba(147,51,234,0.25)}
.rank-item.rank-2nd{background:rgba(60,200,168,0.08);border:1px solid rgba(60,200,168,0.2)}
.rank-item.rank-3rd{background:rgba(232,200,122,0.08);border:1px solid rgba(232,200,122,0.2)}
.rank-avatar{display:none}
.rank-name{flex:1;font-size:13px;font-weight:600;color:var(--label-normal)}
.rank-amount{font-size:13px;font-weight:700;color:var(--accent-gold)}
.rank-item.me{border:1px solid rgba(19,187,143,0.3);background:rgba(19,187,143,0.06)}
.rank-item.me .rank-num{color:var(--primary-normal)}
.me-badge{
  display:inline-block;padding:1px 5px;border-radius:4px;
  background:rgba(19,187,143,0.15);color:var(--primary-normal);
  font-size:9px;font-weight:700;margin-left:4px;
}
</style>
</head>
<body>
<div class="container">
  <div class="profile"><img src="./images/char-profile.png" alt=""></div>
  <div class="title">라이브가 종료되었습니다</div>
  <div class="subtitle">시청해주셔서 감사합니다 💚</div>


  <div class="section-title">👑 후원 랭킹</div>

  <div class="rank-list">
    <div class="rank-item rank-1st">
      <span class="rank-num"><img class="rank-medal" src="./images/icon/Frame 32.png" alt="1"></span>
      <span class="rank-name">3프로</span>
      <span class="rank-amount">💎 3,500</span>
    </div>
    <div class="rank-item rank-2nd">
      <span class="rank-num"><img class="rank-medal" src="./images/icon/Frame 31.png" alt="2"></span>
      <span class="rank-name">내일공감</span>
      <span class="rank-amount">💎 2,100</span>
    </div>
    <div class="rank-item rank-3rd">
      <span class="rank-num"><img class="rank-medal" src="./images/icon/Frame 33.png" alt="3"></span>
      <span class="rank-name">서서죽기</span>
      <span class="rank-amount">💎 1,800</span>
    </div>
    <div class="rank-item">
      <span class="rank-num">4</span>
      <span class="rank-name">치즈충전중</span>
      <span class="rank-amount">💎 1,200</span>
    </div>
    <div class="rank-item">
      <span class="rank-num">5</span>
      <span class="rank-name">허도랭</span>
      <span class="rank-amount">💎 900</span>
    </div>
    <div class="rank-item">
      <span class="rank-num">6</span>
      <div class="rank-avatar"></div>
      <span class="rank-name">괴무리</span>
      <span class="rank-amount">💎 700</span>
    </div>
    <div class="rank-item">
      <span class="rank-num">7</span>
      <div class="rank-avatar"></div>
      <span class="rank-name">바비형아</span>
      <span class="rank-amount">💎 500</span>
    </div>
    <div class="rank-item">
      <span class="rank-num">8</span>
      <div class="rank-avatar"></div>
      <span class="rank-name">따스하루</span>
      <span class="rank-amount">💎 400</span>
    </div>
    <div class="rank-item">
      <span class="rank-num">9</span>
      <div class="rank-avatar"></div>
      <span class="rank-name">육개장한사발</span>
      <span class="rank-amount">💎 200</span>
    </div>
    <div class="rank-item">
      <span class="rank-num">10</span>
      <div class="rank-avatar"></div>
      <span class="rank-name">붉은달</span>
      <span class="rank-amount">💎 150</span>
    </div>
    <div class="rank-item me">
      <span class="rank-num">12</span>
      <div class="rank-avatar"><img src="./images/rank-me.webp" alt=""></div>
      <span class="rank-name">나 <span class="me-badge">ME</span></span>
      <span class="rank-amount">💎 100</span>
    </div>
  </div>
</div>
</body>
</html>
